name: StockPickerBot

on:
  schedule:
    - cron: '10 8 * * *' # 北京时间 16:10
  workflow_dispatch: 

permissions:
  issues: write
  contents: write

jobs:
  stock_scan_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install akshare pandas requests

      # 运行脚本
      - name: Run Main Script
        env:
          # 注意：你必须在仓库 Settings -> Secrets 里设置 PUSHPLUS_TOKEN
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          python main.py > result.txt
          cat result.txt

      # 同时也发一个 Issue 备份
      - name: Create Issue Report
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: "📈 股票推荐报告 - ${{ github.run_id }}"
          content-filepath: ./result.txt
