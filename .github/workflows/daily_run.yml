name: StockPickerBot

# 触发条件
on:
  schedule:
    # 每天北京时间 16:10 运行 (16:10 - 8小时 = UTC 08:10)
    - cron: '10 8 * * *'
  workflow_dispatch: # 允许手动运行

# 必须开启这些权限，机器人才能发 Issue
permissions:
  issues: write
  contents: write

jobs:
  stock_scan_job:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出仓库代码
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. 安装 Python 3.10 环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. 安装必要的库 (解决 ModuleNotFoundError)
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas

      # 4. 调试：查看当前服务器 IP (如果报错断开连接可以排查)
      - name: Check IP Address
        run: curl ifconfig.me

      # 5. 执行 Python 脚本并捕获输出
      - name: Run Main Script
        env:
          # 这一行很关键：把 GitHub Secrets 里的变量传给 Python 
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          python main.py > result.txt
          cat result.txt

      # 6. 将结果作为新的 Issue 发布 (这是你的看涨报告)
      - name: Create Daily Issue Report
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: "📈 每日看涨推荐报告 - ${{ github.run_id }}"
          content-filepath: ./result.txt
          labels: |
            stock-report
            automated
